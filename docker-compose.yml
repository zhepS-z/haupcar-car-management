version: '3.8'

services:
  # MySQL Database Service
  mysql:
    image: mysql:8.0
    container_name: haupcar_mysql
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: haupcar_db
      MYSQL_USER: haupcar_user
      MYSQL_PASSWORD: haupcar_password
      command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Node.js Backend Service
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: haupcar_backend
    depends_on:
      mysql:
        condition: service_healthy
    env_file:
      - ./backend/.env
    environment:
      DB_HOST: mysql
      DB_USER: haupcar_user
      DB_PASSWORD: haupcar_password
      DB_NAME: haupcar_db
      NODE_ENV: development
    ports:
      - "5000:5000"
    volumes:
      - ./backend:/app
      - /app/node_modules
    command: npm start
    restart: unless-stopped

  # phpMyAdmin
  phpmyadmin:
    image: phpmyadmin:5.2
    container_name: haupcar_phpmyadmin
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      PMA_USER: haupcar_user
      PMA_PASSWORD: haupcar_password
      PMA_DB: haupcar_db
      PMA_ARBITRARY: 1
      APACHE_PORT: 80
    ports:
      - "8080:80"
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped

volumes:
  mysql_data:

